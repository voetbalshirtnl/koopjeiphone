  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f3f6ff;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: rgba(15,23,42,0.65);
      --blue: #0071e3;
      --blue-hover: #0b75ff;
      --green: #16a34a;
      --border: rgba(15,23,42,0.08);
      --font: 'Inter', -apple-system, system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.18) 0, transparent 55%),
        radial-gradient(circle at bottom right, rgba(16,185,129,0.12) 0, transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.8rem;
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .nav-logo {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .nav-logo span { color: var(--green); }
    .nav-note {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .nav-links {
      display: flex;
      gap: 0.9rem;
      font-size: 0.8rem;
    }
    .nav-links a {
      color: var(--blue);
      text-decoration: none;
    }
    .nav-links a:hover {
      text-decoration: underline;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .hero {
      max-width: 780px;
      width: 100%;
      background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(248,250,252,0.98));
      border-radius: 28px;
      border: 1px solid rgba(148,163,184,0.25);
      box-shadow:
        0 24px 80px rgba(15,23,42,0.18),
        0 0 0 1px rgba(255,255,255,0.6) inset;
      padding: 2.4rem 2.6rem 2.3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top center, rgba(59,130,246,0.12) 0, transparent 55%);
      opacity: 0.8;
      pointer-events: none;
    }
    .hero-inner { position: relative; z-index: 1; }

    .hero-logo-wrap {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      margin: 0 auto 1rem;
      background: #eef2ff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(148,163,184,0.35);
      box-shadow: 0 12px 30px rgba(15,23,42,0.12);
    }
    .hero-logo-wrap img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      display: block;
    }
